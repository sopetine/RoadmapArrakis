<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arrakis Roadmap</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --lw: 260px; --sw: 148px;
  --rh: 32px; --eh: 38px; --ph: 34px;
  --radius: 3px;
  --font: 'Roboto', sans-serif;
  --border: #DFE1E6;
  --text: #172B4D;
  --text2: #6B778C;
  --blue: #0052CC;
  --panel-bg: #FAFBFC;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font) !important; background: #F4F5F7; color: var(--text); font-size: 13px; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

/* ── Top bar ── */
.top-bar {
  flex-shrink: 0; background: #fff; border-bottom: 1px solid #DFE1E6;
  padding: 0 12px; height: 48px; display: flex; align-items: center; gap: 8px; z-index: 30;
  overflow: hidden;
}
.tb-logo  { height: 26px; width: auto; flex-shrink: 0; object-fit: contain; }
.tb-title { font-size: 14px; font-weight: 700; color: #0052CC; white-space: nowrap; }
.tb-div   { width: 1px; height: 18px; background: #DFE1E6; flex-shrink: 0; }
.tb-sep   { flex: 1; min-width: 4px; }
/* Ticket counter */
.tb-counter { display: flex; gap: 5px; align-items: center; flex-shrink: 0; min-width: 220px; }
.tb-cnt-item { display: flex; align-items: center; gap: 3px; font-size: 10px; color: #6B778C; white-space: nowrap; }
.tb-cnt-num  { font-size: 11px; font-weight: 700; color: #172B4D; }
/* Filter groups (center) */
.tb-filters-center { display: flex; align-items: center; gap: 8px; flex-shrink: 0; white-space: nowrap; }
.tb-filter-group { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
.tb-filter-label { font-size: 10px; font-weight: 600; color: #97A0AF; text-transform: uppercase; letter-spacing: .4px; white-space: nowrap; }
/* ── Segmented mode toggle ── */
.tb-seg-toggle {
  display: inline-flex; border: 1.5px solid #DFE1E6; border-radius: 7px;
  overflow: hidden; flex-shrink: 0; background: #F4F5F7;
}
.tb-seg-opt {
  font-family: var(--font); font-size: 11px; font-weight: 500;
  padding: 5px 14px; cursor: pointer; white-space: nowrap; color: #6B778C;
  user-select: none; transition: background .12s, color .12s;
}
.tb-seg-opt + .tb-seg-opt { border-left: 1.5px solid #DFE1E6; }
.tb-seg-opt.active { background: #0052CC; color: #fff; }
.tb-seg-opt:hover:not(.active) { background: #EBECF0; color: #344563; }
/* PI-mode sub-filters: anchored right of the toggle, slides out without moving the toggle */
#pi-mode-filters {
  display: flex; align-items: center; gap: 6px; flex-shrink: 0;
  overflow: hidden; max-width: 600px; opacity: 1;
  transition: max-width .2s ease, opacity .15s ease;
}
#pi-mode-filters.pi-hidden { max-width: 0 !important; opacity: 0; pointer-events: none; }
/* Jira checkbox-style pills */
.tb-ck-wrap { display: flex; gap: 3px; flex-wrap: nowrap; }
.tb-ck-label {
  display: inline-flex; align-items: center; gap: 4px;
  font-family: var(--font); font-size: 11px; font-weight: 500;
  padding: 3px 9px 3px 7px; border-radius: 12px; cursor: pointer;
  border: 1px solid #DFE1E6; background: #F4F5F7; color: #6B778C;
  transition: background .12s, color .12s, border-color .12s;
  user-select: none; white-space: nowrap;
}
.tb-ck-label input[type=checkbox] { display: none; }
.tb-ck-label .ck-box {
  width: 12px; height: 12px; border-radius: 2px; border: 1.5px solid #97A0AF;
  background: #fff; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  transition: background .12s, border-color .12s;
}
.tb-ck-label.active { background: #DEEBFF; color: #0052CC; border-color: #4C9AFF; }
.tb-ck-label.active .ck-box { background: #0052CC; border-color: #0052CC; }
.tb-ck-label.active .ck-box::after { content: ''; display: block; width: 5px; height: 3px; border-left: 1.5px solid #fff; border-bottom: 1.5px solid #fff; transform: rotate(-45deg) translateY(-1px); }
.tb-ck-label:hover:not(.active) { background: #EBECF0; border-color: #B3BAC5; }
/* Actions & legend */
.tb-actions { display: flex; gap: 4px; flex-shrink: 0; }
.tb-btn {
  font-family: var(--font); background: #fff; color: #344563;
  border: 1px solid #DFE1E6; border-radius: 3px;
  padding: 4px 10px; font-size: 11px; font-weight: 500; cursor: pointer;
}
.tb-btn:hover { background: #F4F5F7; }
.tb-btn-toggle.active { background: #DEEBFF; color: #0052CC; border-color: #4C9AFF; }
.legend { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
.leg-i  { display: flex; align-items: center; gap: 3px; font-size: 10px; color: #6B778C; white-space: nowrap; }
.leg-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
.leg-sep { width: 1px; height: 14px; background: #DFE1E6; }

/* ── Scroll wrapper ── */
.gantt-wrap { flex: 1; overflow: auto; position: relative; background: #F4F5F7; }
#gantt { display: flex; flex-direction: column; }

/* ── Row base ── */
.g-row { display: flex; min-height: var(--rh); }
.g-lbl {
  width: var(--lw); min-width: var(--lw); flex-shrink: 0;
  padding: 4px 10px; display: flex; align-items: center; gap: 5px;
  position: sticky; left: 0; z-index: 5;
  background: var(--panel-bg); border-right: 1px solid #DFE1E6; overflow: hidden;
}
.g-tl { position: relative; flex-shrink: 0; }

/* ── Sprint header ── */
.hdr-row {
  position: sticky; top: 0; z-index: 10; flex-shrink: 0;
  background: #fff; border-bottom: 1px solid #DFE1E6;
}
.hdr-lbl {
  background: #fff; z-index: 11; flex-direction: column;
  align-items: flex-start; min-height: 46px; justify-content: center;
  border-right: 2px solid #DFE1E6;
}
.hdr-team { font-size: 13px; font-weight: 700; color: #172B4D; }
.hdr-sub  { font-size: 10px; color: #6B778C; margin-top: 1px; }
.sp-cell {
  position: absolute; top: 0; bottom: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  border-right: 1px solid #E3E6EC; text-align: center; padding: 2px 4px;
}
.sp-line1  { display: flex; align-items: center; justify-content: center; gap: 4px; white-space: nowrap; }
.sp-code   { font-size: 11px; font-weight: 700; color: #172B4D; }
.sp-line2  { font-size: 9px; color: #97A0AF; white-space: nowrap; margin-top: 2px; }
.sp-pi-tag { font-size: 8px; font-weight: 600; color: #5E6C84; background: #EBECF0; padding: 0 4px; border-radius: 8px; white-space: nowrap; }
.sp-cell.sp-active { background: #E3FCEF; }
.sp-cell.sp-active .sp-code { color: #006644; font-weight: 800; }
.sp-cell.sp-active .sp-line2 { color: #00875A; }
.sp-cell.sp-active .sp-pi-tag { background: #ABF5D1; color: #006644; }
.sp-cell.sp-past .sp-code { color: #B3BAC5; }
.sp-cell.sp-past .sp-line2 { color: #C1C7D0; }
.sp-pi-sep { border-left: 2px dashed #C1C7D0; }

/* ── Sprint column guides — alternating ── */
.sg      { position: absolute; top: 0; bottom: 0; pointer-events: none; border-right: 1px solid rgba(9,30,66,.06); }
.sg-alt  { background: rgba(9,30,66,.02); }
.sg-act  { background: rgba(0,135,90,.035); border-right-color: rgba(0,135,90,.12); }
.sg-past { background: rgba(9,30,66,.01); }

/* ── Timeline strip (NOW tag, no line) ── */
.tl-strip {
  position: sticky; top: 46px; z-index: 9; height: 22px; flex-shrink: 0;
  background: #fff; border-bottom: 1px solid #DFE1E6; display: flex;
}
.tl-strip-lbl {
  width: var(--lw); min-width: var(--lw); flex-shrink: 0; background: #fff;
  border-right: 1px solid #DFE1E6; position: sticky; left: 0; z-index: 5;
}
.tl-strip-tl { position: relative; flex-shrink: 0; height: 22px; overflow: visible; }
.now-strip { position: absolute; top: 0; bottom: 0; width: 2px; background: #DE350B; z-index: 6; pointer-events: none; }
.now-tag {
  position: absolute; top: 50%; transform: translate(-50%, -50%);
  background: #DE350B; color: white; font-size: 9px; font-weight: 700;
  padding: 1px 6px; border-radius: 10px; white-space: nowrap;
  pointer-events: none; z-index: 7;
}
/* NOW line in content rows */
.now-line { position: absolute; top: 0; bottom: 0; width: 2px; background: #DE350B; opacity: .35; z-index: 6; pointer-events: none; }

/* ── POR separator — prominent, title spans full row ── */
.por-row {
  min-height: var(--ph); position: relative;
  background: #E4EBF8; border-top: 2px solid #B3C1DE; border-bottom: 1px solid #C5D2EA;
}
.por-row-guides { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
.por-lbl {
  background: #E4EBF8; min-height: var(--ph); gap: 5px; flex-wrap: nowrap;
  align-items: center; width: auto !important; min-width: var(--lw);
  overflow: visible !important; position: sticky; left: 0; z-index: 5;
  padding-right: 20px;
}
.por-prio-tag {
  font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 10px;
  white-space: nowrap; flex-shrink: 0;
}
.por-key {
  font-weight: 700; font-size: 11px; color: #0052CC;
  background: rgba(0,82,204,.12); padding: 2px 7px; border-radius: 3px;
  white-space: nowrap; text-decoration: none; flex-shrink: 0;
}
.por-key:hover { background: rgba(0,82,204,.22); text-decoration: underline; }
.por-title { font-size: 11px; font-weight: 600; color: #172B4D; white-space: nowrap; flex-shrink: 0; }
.por-flags { display: flex; gap: 2px; flex-shrink: 0; font-size: 12px; }
.por-cmt-tag { font-size: 9px; font-weight: 600; color: #5243AA; background: #EAE6FF; padding: 1px 6px; border-radius: 10px; flex-shrink: 0; }
.por-tl { position: relative; flex-shrink: 0; min-height: var(--ph); }

/* ── Epic header row ── */
.epic-row { min-height: var(--eh); background: #FAFBFC; cursor: pointer; }
.epic-row:hover { background: #F0F1F4; }
.epic-lbl {
  background: #FAFBFC; min-height: var(--eh); gap: 6px;
  border-right: 1px solid #DFE1E6; align-items: center; cursor: pointer;
}
/* Expand/collapse button — chevron style */
.exp-btn {
  width: 18px; height: 18px; border-radius: 3px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: #5E6C84;
  transition: background .1s, transform .15s;
}
.exp-btn svg { width: 10px; height: 10px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; transition: transform .15s; }
.exp-btn.collapsed svg { transform: rotate(-90deg); }
.exp-btn:hover { background: #DFE1E6; }
.epic-lbl-info { display: flex; flex-direction: column; gap: 2px; overflow: hidden; min-width: 0; flex: 1; align-items: flex-end; text-align: right; }
.epic-status-badge {
  font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px;
  padding: 1px 6px; border-radius: 10px; white-space: nowrap; display: inline-block;
  align-self: flex-start;
}
.epic-lbl-info .epic-status-badge { align-self: flex-end; }
.status-done     { background: #E3FCEF; color: #006644; }
.status-blocked  { background: #FFEBE6; color: #DE350B; }
.status-progress { background: #EAE6FF; color: #5243AA; }
.status-nosprint { background: #FFF0B3; color: #974F0C; }
.status-planned  { background: #DEEBFF; color: #0052CC; }
.status-default  { background: #EBECF0; color: #5E6C84; }
.epic-pct-text { font-size: 10px; color: #6B778C; }

/* ── Epic progress bar — gradient warm → green, pill shape, darker incomplete ── */
.epic-bg {
  position: absolute; top: 3px; bottom: 3px;
  background: #C8D4E8; border-radius: 20px; overflow: hidden;
  border: 3px solid #1D2B4F;
}
.epic-prog {
  position: absolute; top: 0; bottom: 0; left: 0;
  background: linear-gradient(to right, #79E2A0, #36B37E);
  z-index: 1; border-radius: 20px 0 0 20px;
  transition: width .3s ease;
}
.epic-bar-inner {
  position: absolute; inset: 0; display: flex; align-items: center;
  padding: 0 10px; z-index: 2; pointer-events: none; gap: 6px; overflow: hidden;
}
/*
 * Epic bar priority system (priority 1 = last to disappear):
 *   1 title  → flex-shrink:1,   min-width:50px  — never gone, fills space
 *   2 ticket → flex-shrink:500, min-width:10px  — trims to "T" then gone
 *   3 por-id → flex-shrink:1000,min-width:10px  — trims to "P" then gone
 *   4 pct    → flex-shrink:10000,min-width:0    — disappears before IDs trim
 *   5 rem    → flex-shrink:999999,min-width:0   — disappears first
 */
.epic-bar-pct    { font-size: 13px; font-weight: 800; color: #172B4D; white-space: nowrap; flex: 0 10000 auto; min-width: 0; overflow: hidden; }
.epic-bar-title  { font-size: 12px; font-weight: 600; color: #172B4D; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1 1 50px; min-width: 50px; }
.epic-bar-id     { font-size: 11px; font-weight: 700; color: #0052CC; white-space: nowrap; flex: 0 500 auto; min-width: 10px; overflow: hidden; background: rgba(255,255,255,.7); padding: 1px 6px; border-radius: 3px; pointer-events: all; text-decoration: none; cursor: pointer; }
.epic-bar-id:hover { background: rgba(255,255,255,.95); text-decoration: underline; }
.epic-bar-rem    { font-size: 10px; font-weight: 500; color: #344563; white-space: nowrap; flex: 0 999999 auto; min-width: 0; overflow: hidden; opacity: .75; }
/* POR prefix tag — shown only when POR rows are hidden */
.epic-bar-por-pfx { display: none; align-items: center; gap: 3px; flex: 0 1000 auto; min-width: 10px; overflow: hidden; white-space: nowrap; }
.epic-bar-por-id  { font-size: 11px; font-weight: 700; color: #6554C0; background: rgba(255,255,255,.7); padding: 1px 6px; border-radius: 3px; pointer-events: all; text-decoration: none; cursor: pointer; white-space: nowrap; }
.epic-bar-por-id:hover { background: rgba(255,255,255,.95); text-decoration: underline; }
.epic-bar-por-sep { font-size: 10px; color: #8993A4; flex-shrink: 0; }
body.hide-pors .epic-bar-por-pfx { display: inline-flex; }
body.hide-pors .por-row { display: none !important; }
/* placeholder bar for all-no-sprint epics */
.epic-empty-bar {
  position: absolute; top: 3px; bottom: 3px; left: 8px; right: 8px;
  border-radius: 20px; border: 2px dashed #B3BAC5;
  display: flex; align-items: center; overflow: hidden;
}

/* ── Epic group: CSS Grid ── */
.epic-grp { display: grid; grid-template-columns: var(--lw) auto; grid-auto-rows: var(--rh); }
.eml {
  position: sticky; left: 0; z-index: 5;
  background: var(--panel-bg); border-right: 1px solid #DFE1E6;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 4px 8px; gap: 2px; overflow: hidden; cursor: default;
}
.eml:hover { background: #F0F1F4; }
.eml-key  { font-size: 10px; font-weight: 600; color: #0052CC; background: rgba(0,82,204,.1); padding: 1px 6px; border-radius: 3px; text-decoration: none; white-space: nowrap; }
.eml-key:hover { background: rgba(0,82,204,.2); text-decoration: underline; }
.eml-flags { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; font-size: 11px; }
.eml-name { font-size: 10px; font-weight: 500; color: #172B4D; word-break: break-word; line-height: 1.3; overflow: hidden; }
.eml-stat { font-size: 9px; color: #6B778C; }

/* ── Task row cells ── */
.eml-ph { background: var(--panel-bg); border-right: 1px solid #DFE1E6; height: var(--rh); }
.eml-ns { background: #FEFCE8; border-right: 1px solid #DFE1E6; height: var(--rh); }
.task-tl { position: relative; flex-shrink: 0; height: var(--rh); background: white; }
.task-ns { position: relative; flex-shrink: 0; height: var(--rh); background: #FEFCE8; }

/* ── Task bars — compact 2-line ── */
.task-bar {
  position: absolute; top: 2px; bottom: 2px;
  border-radius: var(--radius); display: flex; align-items: stretch;
  text-decoration: none; color: inherit; overflow: hidden;
  box-shadow: 0 1px 2px rgba(9,30,66,.15);
  transition: box-shadow .1s; cursor: pointer; z-index: 2;
}
.task-bar:hover { box-shadow: 0 2px 8px rgba(9,30,66,.25); z-index: 10; }
.task-bar.overdue  { outline: 2px solid #FFAB00; outline-offset: -1px; }
.task-bar.all-closed { outline: 2px solid #36B37E; outline-offset: -1px; }
.task-bar.ns-bar { opacity: 0.3; }
.task-bar.ns-bar:hover { opacity: 1; }

/* SP stripe */
.p-sp {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-width: 38px; padding: 1px 3px; gap: 0; flex-shrink: 0;
  border-right: 1px solid rgba(0,0,0,.1);
}
.sp-line { display: flex; align-items: center; gap: 1px; line-height: 1.15; white-space: nowrap; }
.sp-num  { font-size: 9px; font-weight: 700; color: white; }
.sp-lbl  { font-size: 8px; color: rgba(255,255,255,.8); }
.sp-si   { font-size: 9px; font-weight: 700; color: white; line-height: 1; }
.sp-div  { width: 18px; height: 1px; background: rgba(255,255,255,.3); flex-shrink: 0; margin: 1px 0; }

/* Title area */
.p-title {
  flex: 1; min-width: 0; display: flex; flex-direction: column;
  justify-content: center; padding: 1px 4px; overflow: hidden; gap: 0px;
}
.bar-line1 { display: flex; gap: 2px; align-items: flex-start; overflow: hidden; flex: 1; min-width: 0; }
.bar-ico   { font-size: 10px; flex-shrink: 0; line-height: 1.2; }
.bar-flag  { font-size: 9px; color: #DE350B; flex-shrink: 0; line-height: 1.2; }
.bar-txt   { font-size: 10px; color: #172B4D; line-height: 1.2; overflow: hidden; min-width: 0;
             display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; font-weight: 500; }
.bar-line2 { display: flex; align-items: center; gap: 3px; overflow: hidden; flex-shrink: 0; min-height: 13px; }
.bar-av    { display: flex; align-items: center; gap: 2px; overflow: hidden; min-width: 0; }
.av-img    { width: 12px; height: 12px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
.av-fb     { width: 12px; height: 12px; border-radius: 50%; background: #DFE1E6; display: none; font-size: 7px; align-items: center; justify-content: center; color: #6B778C; flex-shrink: 0; }
.av-name   { font-size: 8px; color: #6B778C; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── Tooltips — Jira white style ── */
#ttip, #av-ttip {
  display: none; position: fixed; z-index: 100;
  background: #fff; color: #172B4D;
  border-radius: 4px; padding: 10px 14px;
  font-family: var(--font); font-size: 11px; line-height: 1.5;
  max-width: 340px; min-width: 200px;
  box-shadow: 0 4px 16px rgba(9,30,66,.2);
  border: 1px solid #DFE1E6; pointer-events: none;
}
#av-ttip { z-index: 101; min-width: 260px; }
.t-h    { font-size: 12px; font-weight: 700; color: #0052CC; margin-bottom: 4px; }
.t-ttl  { color: #172B4D; font-size: 11px; margin-bottom: 5px; line-height: 1.4; font-weight: 500; }
.t-av-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.t-av-img { width: 22px; height: 22px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
.t-av-fb  { width: 22px; height: 22px; border-radius: 50%; background: #DFE1E6; display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; }
.t-av-name { font-size: 11px; font-weight: 600; color: #172B4D; }
.t-row  { display: flex; gap: 6px; margin-bottom: 2px; align-items: baseline; }
.t-l    { color: #97A0AF; font-size: 10px; white-space: nowrap; min-width: 90px; }
.t-v    { color: #172B4D; font-size: 11px; }
.t-sec  { margin-top: 6px; border-top: 1px solid #F0F1F4; padding-top: 5px; }
.t-sec-h { font-size: 9px; text-transform: uppercase; letter-spacing: .6px; color: #97A0AF; margin-bottom: 3px; font-weight: 700; }
.t-sp   { color: #0052CC; font-size: 12px; font-weight: 700; }
.t-warn { color: #DE350B; font-size: 11px; margin-top: 4px; font-weight: 600; }
.t-blk-link { color: #DE350B; font-size: 11px; text-decoration: none; }
.t-blk-link:hover { text-decoration: underline; }
.t-blk-st { font-size: 10px; color: #97A0AF; }
</style>
</head>
<body>

<div class="top-bar">
  <img class="tb-logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/41/Ahold_Delhaize_logo.svg/200px-Ahold_Delhaize_logo.svg.png" alt="Ahold Delhaize" onerror="this.style.display='none'">
  <div class="tb-title" id="tb-t"></div>
  <div class="tb-div"></div>
  <div class="tb-counter" id="tb-counter"></div>
  <div class="tb-div"></div>
  <div class="tb-seg-toggle">

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmt(n){const r=Math.round(n*10)/10;return r===Math.floor(r)?String(Math.floor(r)):r.toFixed(1);}
function fmtDate(d){if(!d||d==='?')return '';return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function fmtDTCompact(iso){
  if(!iso)return '';
  try{
    const dt=new Date(iso),tz='Europe/Kyiv';
    const tm=dt.toLocaleTimeString('en-US',{timeZone:tz,hour:'2-digit',minute:'2-digit',hour12:false});
    const d=dt.toLocaleDateString('en-US',{timeZone:tz,month:'short',day:'numeric'});
    return `${d}, ${tm}`;
  }catch(e){return '';}}
function timeAgo(iso){
  if(!iso)return '';
  const s=(Date.now()-new Date(iso))/1000;
  const d=Math.floor(s/86400),h=Math.floor((s%86400)/3600),m=Math.floor((s%3600)/60);
  const p=[];if(d>0)p.push(d+'d');if(h>0)p.push(h+'h');if(m>0&&d===0)p.push(m+'m');
  if(!p.length)p.push('0m');return p.join(' ')+' ago';}

// Sort tasks: completed → in-progress → not-started → blocked
function taskStatePrio(t){
  const st=(t.status||'').toLowerCase();
  if(t.state==='completed'||st==='closed')return 0;
  if(IN_PROG.has(st))return 1;
  if(t.state==='err:blocked')return 3;
  return 2;}
function sortedTasks(arr){
  return [...arr].sort((a,b)=>taskStatePrio(a)-taskStatePrio(b)||tickNum(a.key)-tickNum(b.key));}

// Epic criticality for sorting
function epicCriticality(epic){
  const tasks=epic.tasks||[];
  if(tasks.some(t=>t.state==='err:blocked'))return 0;
  if(tasks.some(t=>IN_PROG.has((t.status||'').toLowerCase())))return 1;
  if(tasks.some(t=>t.state==='err:no-plan'||t.state==='err:no-comp'))return 2;
  if(tasks.some(t=>t.state==='planned'))return 3;
  return 4;}

// Map any Jira status name → [label, cssClass]
// statusCat: Jira statusCategory.key — "new" | "indeterminate" | "done" — used as reliable fallback
function jiraStatusBadge(status, statusCat){
  const s=(status||'').toLowerCase().trim();
  // ── Explicit name matches (highest priority) ────────────────────────────
  if(['done','closed','resolved','complete','completed','released','deployed',
      'delivered','verified','accepted','wont fix','won\'t fix'].includes(s))
    return [status||'Done','status-done'];
  if(['blocked','impediment'].includes(s))
    return [status,'status-blocked'];
  if(['in progress','in development','in code review','developed','ready for test',
      'test ongoing','in review','testing','in qa','in test','in analysis',
      'analysis','delivery','development','implementing'].some(x=>s===x))
    return [status,'status-progress'];
  if(['on hold','waiting','deferred','paused','postponed','at risk'].includes(s))
    return [status,'status-nosprint'];
  if(['planned','selected for development','ready','committed','approved',
      'in scope','in planning','ready to develop'].some(x=>s===x))
    return [status,'status-planned'];
  if(!status||['to do','open','backlog','new','cancelled','rejected',
               'out of scope','wontdo','won\'t do'].includes(s))
    return [status||'To Do','status-default'];
  // ── Fall back to Jira statusCategory.key (works for all custom statuses) ─
  if(statusCat==='done')         return [status,'status-done'];
  if(statusCat==='indeterminate')return [status,'status-progress'];
  if(statusCat==='new')          return [status,'status-default'];
  // Unknown — show the Jira name with grey styling
  return [status,'status-default'];}

function epicStatusBadge(epic){
  if(epic.status) return jiraStatusBadge(epic.status, epic.status_cat||'');
  // Fallback: no Jira status — derive from tasks
  const tasks=epic.tasks||[];
  const withSp=tasks.filter(t=>t.c0!==null&&t.c0!==undefined);
  if(!tasks.length||!withSp.length) return ['To Do','status-default'];
  if(withSp.every(t=>t.state==='completed')) return ['Done','status-done'];
  if(withSp.some(t=>t.state==='err:blocked')) return ['Blocked','status-blocked'];
  if(withSp.some(t=>IN_PROG.has((t.status||'').toLowerCase()))) return ['In Progress','status-progress'];
  return ['Planned','status-planned'];}

function pack(tasks){
  const rows=[];
  const sorted=[...tasks].sort((a,b)=>(a.c0??999)-(b.c0??999));
  for(const t of sorted){
    if(t.c0===null)continue;
    let ok=false;
    for(const row of rows){if(!row.some(r=>t.c0<=r.c1&&t.c1>=r.c0)){row.push(t);ok=true;break;}}
    if(!ok)rows.push([t]);}
  return rows;}

let SPRINTS=[];
function computeOffsetMax(pors){
  let mn=Infinity,mx=-1;
  if(backlogOn){
    // Backlog mode: show ALL sprint columns so every board-task sprint is visible
    DATA.sprints.forEach((_,i)=>{mn=Math.min(mn,i);mx=Math.max(mx,i);});
    if(DATA.board_tasks)for(const t of DATA.board_tasks)
      if(t._c0!==null&&t._c0!==undefined){mn=Math.min(mn,t._c0);mx=Math.max(mx,t._c1);}
  } else {
    // PI mode: expand to cover the full sprint range for every selected PI
    for(const p of pors)for(const e of p.epics)for(const t of e.tasks)
      if(t._c0!==null&&t._c0!==undefined){mn=Math.min(mn,t._c0);mx=Math.max(mx,t._c1);}
    DATA.sprints.forEach((s,i)=>{
      if(selectedPIs.has(s.pi)||selectedPIs.size===0){mn=Math.min(mn,i);mx=Math.max(mx,i);}});
  }
  return [mn===Infinity?0:mn, mx===-1?DATA.sprints.length-1:mx];}
function nowX(sprints){
  const today=new Date();today.setHours(12,0,0,0);
  for(let i=0;i<sprints.length;i++){
    if(!sprints[i].from||sprints[i].from==='?')continue;
    const f=new Date(sprints[i].from+'T00:00:00'),t=new Date(sprints[i].to+'T23:59:59');
    if(today>=f&&today<=t)return i*SW+((today-f)/(t-f))*SW;
    if(today<f)return i*SW;}
  return sprints.length*SW;}
function overdue(t){
  if(t.state==='completed')return false;
  if(!t.cols.length)return false;
  return t.cols.every(c=>SPRINTS[c]?.state==='closed');}
function guides(N,sprints){
  let h='';
  for(let i=0;i<N;i++){
    const s=sprints[i];let cls='sg';
    if(s?.state==='active')cls+=' sg-act';
    else if(s?.state==='closed')cls+=' sg-past';
    else if(i%2===1)cls+=' sg-alt';
    h+=`<div class="${cls}" style="left:${i*SW}px;width:${SW}px"></div>`;}
  return h;}

function initFilters(){
  // ── Mode switcher: PI View ↔ Backlog (mutually exclusive) ──────────────
  const modePi      = document.getElementById('mode-pi');
  const modeBacklog = document.getElementById('mode-backlog');
  const piModeFilters = document.getElementById('pi-mode-filters');
  modePi.addEventListener('click', ()=>{
    if(backlogOn){
      backlogOn=false;
      modePi.classList.add('active'); modeBacklog.classList.remove('active');
      piModeFilters.classList.remove('pi-hidden'); render();}});
  modeBacklog.addEventListener('click', ()=>{
    if(!backlogOn){
      backlogOn=true;
      modeBacklog.classList.add('active'); modePi.classList.remove('active');
      piModeFilters.classList.add('pi-hidden'); render();}});

  // ── PI filter ───────────────────────────────────────────────────────────
  const availPIs=[...new Set(DATA.pors.map(p=>p.pi))].sort();
  const defaultPI=availPIs.find(p=>p.includes('PI1'))||availPIs[0]||'';
  const piDiv=document.getElementById('pi-filters');
  availPIs.forEach(pi=>{
    const active=pi===defaultPI; if(active)selectedPIs.add(pi);
    piDiv.appendChild(mkCkLabel(pi, pi.replace('2026.',''), active, (v,el)=>{
      if(selectedPIs.has(v)){selectedPIs.delete(v);el.classList.remove('active');}
      else{selectedPIs.add(v);el.classList.add('active');}
      render();}));});

  // ── Commitment filter ───────────────────────────────────────────────────
  const cmtDiv=document.getElementById('cmt-filters');
  ['committed','stretch'].forEach(c=>{
    selectedCmts.add(c);
    cmtDiv.appendChild(mkCkLabel(c, cmtLabel(c), true, (v,el)=>{
      if(selectedCmts.has(v)){selectedCmts.delete(v);el.classList.remove('active');}
      else{selectedCmts.add(v);el.classList.add('active');}
      render();}));});}

    .sort((a,b)=>{

      if(a.commitment!==b.commitment)return (co[a.commitment]??1)-(co[b.commitment]??1);

  const bvHtml=por.bv?Object.entries(por.bv).filter(([,v])=>v).map(([k,v])=>`<div class="t-row"><span class="t-l">${esc(k)} BV</span><span class="t-v">${esc(v)}</span></div>`).join(''):'';
  const labelHtml=por.labels?.length?`<div class="t-row"><span class="t-l">Labels</span><span class="t-v" style="font-size:10px">${por.labels.map(l=>esc(l)).join(' &middot; ')}</span></div>`:'';
  const versHtml=por.fix_versions?.length?`<div class="t-row"><span class="t-l">Fix Version</span><span class="t-v">${por.fix_versions.map(v=>esc(v)).join(', ')}</span></div>`:'';
  const countriesHtml=por.countries?.length?`<div class="t-row"><span class="t-l">Countries</span><span class="t-v">${por.countries.map(c=>esc(c)).join(', ')}</span></div>`:'';
  return `
    <div class="t-h"><a href="${JIRA}${esc(por.key)}" target="_blank" style="color:#0052CC;text-decoration:none">${esc(por.key)}</a>
      &nbsp;<span style="font-size:10px;color:#97A0AF">${esc(por.commitment||'')} · ${esc(por.pi||'')}</span></div>
    <div class="t-ttl">${esc(por.title)}</div>
    ${por.status?`<div class="t-row"><span class="t-l">Status</span><span class="t-v" style="font-weight:600">${esc(por.status)}</span></div>`:''}
    ${por.priority?`<div class="t-row"><span class="t-l">Priority</span><span class="t-v">${esc(por.priority)}</span></div>`:''}
    ${repHtml}${parentHtml}
    <div class="t-sec"><div class="t-sec-h">Planning</div>
      ${por.platform?`<div class="t-row"><span class="t-l">Platform</span><span class="t-v">${esc(por.platform)}</span></div>`:''}
      ${por.solution_arch?`<div class="t-row"><span class="t-l">Solution Arch</span><span class="t-v">${esc(por.solution_arch)}</span></div>`:''}
      ${versHtml}
      ${por.activation_ver?`<div class="t-row"><span class="t-l">Activation Ver</span><span class="t-v">${esc(por.activation_ver)}</span></div>`:''}
    </div>
    ${countriesHtml||bvHtml?`<div class="t-sec"><div class="t-sec-h">Countries &amp; BV</div>${countriesHtml}${bvHtml}</div>`:''}
    ${por.perf_impact||por.ab_test?`<div class="t-sec"><div class="t-sec-h">Testing</div>
      ${por.perf_impact?`<div class="t-row"><span class="t-l">Perf Impact</span><span class="t-v">${esc(por.perf_impact)}</span></div>`:''}
      ${por.ab_test?`<div class="t-row"><span class="t-l">A/B Test</span><span class="t-v">${esc(por.ab_test)}</span></div>`:''}
    </div>`:''}
    ${labelHtml?`<div class="t-sec"><div class="t-sec-h">Labels</div>${labelHtml}</div>`:''}  `;}

function barHtml(t,extraStyle,extraCls=''){
  const c=clr(t);
  const tid='tt-'+t.key.replace(/[^a-z0-9]/gi,'-');
  TIPS[tid]=taskTip(t);
  const od=overdue(t)?' overdue':'';
  const ac=(t.state==='err:blocked'&&allBlockersClosed(t))?' all-closed':'';
  const ico=TYPE_ICON[t.type]||'';
  const showDev=t.dev>0||t.qa===0,showQa=t.qa>0;
  let sp='';
  if(showDev)sp+=`<div class="sp-line"><span class="sp-num">${fmt(t.dev)}</span><span class="sp-lbl">Dev</span>${devSI(t.status)}</div>`;
  if(showDev&&showQa)sp+=`<div class="sp-div"></div>`;
  if(showQa)sp+=`<div class="sp-line"><span class="sp-num">${fmt(t.qa)}</span><span class="sp-lbl">QA</span>${qaSI(t.status)}</div>`;
  return `<a class="task-bar${od}${ac}${extraCls?' '+extraCls:''}" href="${JIRA}${esc(t.key)}" target="_blank"
      data-tipid="${tid}" style="${extraStyle};background:${c.bg}">
    <div class="p-sp" style="background:${c.stripe}">${sp}</div>
    <div class="p-title">
      <div class="bar-line1">
        ${t.flagged?'<span class="bar-flag">&#9873;</span>':''}
        ${ico?`<span class="bar-ico">${ico}</span>`:''}
        <span class="bar-txt">${esc(t.title)}</span>
      </div>
      ${avHtml(t)}
    </div></a>`;}

// Expand state: persisted across re-renders
const expandState = {};   // epicId → true=expanded, false=collapsed

// ── Main render ───────────────────────────────────────────────────────────
function render(){
  const filteredPors=getFilteredPors();

  // Save original cols once — idempotent across re-renders (POR tasks)
  for(const p of DATA.pors)for(const e of p.epics)for(const t of e.tasks)
    if(!t._origCols)t._origCols=[...t.cols];
  // Board tasks
  if(DATA.board_tasks)for(const t of DATA.board_tasks)
    if(!t._origCols)t._origCols=[...t.cols];

  // Prep c0/c1 always from original cols
  for(const p of DATA.pors)for(const e of p.epics)for(const t of e.tasks){
    t._c0=t._origCols.length?Math.min(...t._origCols):null;
    t._c1=t._origCols.length?Math.max(...t._origCols):null;}
  if(DATA.board_tasks)for(const t of DATA.board_tasks){
    t._c0=t._origCols.length?Math.min(...t._origCols):null;
    t._c1=t._origCols.length?Math.max(...t._origCols):null;}

  // Sort epics by criticality
  for(const p of filteredPors)p.epics.sort((a,b)=>epicCriticality(a)-epicCriticality(b));

  const [offset,maxCol]=computeOffsetMax(filteredPors);
  const allDisplaySprints=DATA.sprints.slice(offset,maxCol+1);

  SPRINTS=allDisplaySprints;
  const N=SPRINTS.length,TW=N*SW,NX=nowX(SPRINTS);

  // Build sprint index map: DATA.sprints global index → display index
  const sprintIdxMap={};
  SPRINTS.forEach((s,di)=>{
    const gi=DATA.sprints.findIndex(ds=>ds.id===s.id);
    if(gi>=0)sprintIdxMap[gi]=di;});

  function remapCols(t){
    if(t._c0===null){t.c0=null;t.c1=null;t.cols=[];return;}
    const mapped=t._origCols.map(c=>sprintIdxMap[c]).filter(c=>c!==undefined);
    if(mapped.length){t.cols=mapped.sort((a,b)=>a-b);t.c0=Math.min(...t.cols);t.c1=Math.max(...t.cols);}
    else{t.c0=null;t.c1=null;t.cols=[];}}
  // Re-map task cols using sprint index map
  for(const p of DATA.pors)for(const e of p.epics)for(const t of e.tasks)remapCols(t);
  if(DATA.board_tasks)for(const t of DATA.board_tasks)remapCols(t);

  const piFirst={};const seen=new Set();
  SPRINTS.forEach((s,i)=>{if(!seen.has(s.pi)){piFirst[i]=true;seen.add(s.pi);}});

  // Top-left: show extraction date/time, not just the team name
  (function(){
    const dt=DATA.generated_at?new Date(DATA.generated_at):null;
    let label='Generated';
    if(dt){
      const tz='Europe/Kyiv';
      const d=dt.toLocaleDateString('en-GB',{timeZone:tz,day:'2-digit',month:'short',year:'numeric'});
      const t=dt.toLocaleTimeString('en-US',{timeZone:tz,hour:'2-digit',minute:'2-digit',hour12:false});
      label=`Generated: ${d}, ${t}`;
    }
    document.getElementById('tb-t').textContent=label;
  })();

  // Ticket counter
  let cntPor=filteredPors.length,cntTask=0,cntBug=0,cntEpic=0;
  for(const p of filteredPors)for(const e of p.epics){cntEpic++;for(const t of e.tasks){if((t.type||'').toLowerCase()==='bug')cntBug++;else cntTask++;}}
  const cEl=document.getElementById('tb-counter');
  cEl.innerHTML=`
    <div class="tb-cnt-item"><span class="tb-cnt-num">${cntPor}</span>&nbsp;PORs</div>
    <div class="tb-cnt-item" style="color:#B3BAC5">·</div>
    <div class="tb-cnt-item"><span class="tb-cnt-num">${cntEpic}</span>&nbsp;Epics</div>
    <div class="tb-cnt-item" style="color:#B3BAC5">·</div>
    <div class="tb-cnt-item"><span class="tb-cnt-num">${cntTask}</span>&nbsp;Tasks</div>
    ${cntBug?`<div class="tb-cnt-item" style="color:#B3BAC5">·</div><div class="tb-cnt-item"><span class="tb-cnt-num">${cntBug}</span>&nbsp;🐞</div>`:''}`;

  let html='';

  // ── Sprint header ──────────────────────────────────────────────────────
  html+=`<div class="g-row hdr-row" style="min-height:46px">
    <div class="g-lbl hdr-lbl">
      <span class="hdr-team">${esc(DATA.team)}</span>
      <span class="hdr-sub">Roadmap</span>
    </div>
    <div class="g-tl" style="width:${TW}px;min-height:46px">`;
  SPRINTS.forEach((s,i)=>{
    let cls='sp-cell';
    if(s.state==='active')cls+=' sp-active';
    if(s.state==='closed')cls+=' sp-past';
    if(piFirst[i])cls+=' sp-pi-sep';
    const dates=s.from?`${fmtDate(s.from)} – ${fmtDate(s.to)}`:'';
    const pi=piLabel(s.pi);
    html+=`<div class="${cls}" style="left:${i*SW}px;width:${SW}px">
      <div class="sp-line1"><span class="sp-code">${esc(s.code)}</span><span class="sp-pi-tag">${pi}</span></div>
      <div class="sp-line2">${dates}</div>
    </div>`;});
  html+=`</div></div>`;

  // ── Timeline strip: timestamp pill, no line ────────────────────────────
  const tsLabel='NOW';
  html+=`<div class="tl-strip">
    <div class="tl-strip-lbl"></div>
    <div class="tl-strip-tl" style="width:${TW}px">
      <div class="now-strip" style="left:${NX.toFixed(1)}px">
        <div class="now-tag">${esc(tsLabel)}</div>
      </div>
    </div>
  </div>`;

  // ── POR rows (PI mode only) ────────────────────────────────────────────
  if(!backlogOn) for(const por of filteredPors){
    const prioClr=POR_PRIO_CLR[por.priority||'']||POR_PRIO_CLR['Normal'];
    const prioTag=`<span class="por-prio-tag" style="background:${prioClr.bg};color:${prioClr.color}">${esc(por.priority||'Normal')}</span>`;
    const cmtTag=por.commitment==='stretch'
      ?`<span class="por-cmt-tag">Stretched</span>`:'';
    const countryFlags=(por.countries||[]).map(c=>FLAG[c]||'').filter(Boolean);
    const flagsHtml=countryFlags.length?`<span class="por-flags">${countryFlags.join('')}</span>`:'';
    // Total BV across all countries — same color palette as priority tag
    let totalBv=0;
    if(por.bv)Object.values(por.bv).forEach(v=>{const n=parseFloat(String(v||'').replace(/[^0-9.]/g,''));if(!isNaN(n)&&n>0)totalBv+=n;});
    const bvTag=totalBv>0?`<span class="por-prio-tag" style="background:${prioClr.bg};color:${prioClr.color};font-weight:700">BV&thinsp;${totalBv%1===0?totalBv:totalBv.toFixed(1)}</span>`:'';

    const [porStatus,porStatusCls]=jiraStatusBadge(por.status, por.status_cat||'');
    const porStatusTag=por.status?`<span class="epic-status-badge ${porStatusCls}" style="font-size:8px">${esc(porStatus)}</span>`:'';
    const ptid='pt-'+por.key.replace(/[^a-z0-9]/gi,'-');
    TIPS[ptid]=porTip(por);

    html+=`<div class="por-row" data-tipid="${ptid}">
      <div class="por-row-guides" style="left:${LW}px">${guides(N,SPRINTS)}<div class="now-line" style="left:${NX.toFixed(1)}px"></div></div>
      <div class="g-lbl por-lbl">
        ${porStatusTag}${bvTag}${prioTag}
        <a class="por-key" href="${JIRA}${esc(por.key)}" target="_blank" onclick="event.stopPropagation()">${esc(por.key)}</a>
        <span class="por-title">${esc(por.title)}</span>
        ${flagsHtml}
        ${cmtTag}
      </div>
    </div>`;

    // POR with no delivery epics — show dashed placeholder row
    if(por.epics.length===0){
      html+=`<div class="g-row epic-row" style="cursor:default">
        <div class="g-lbl epic-lbl" style="justify-content:flex-end">
          <span class="epic-status-badge status-default" style="align-self:center">To Do</span>
        </div>
        <div class="g-tl" style="width:${TW}px;min-height:var(--eh)">
          ${guides(N,SPRINTS)}<div class="now-line" style="left:${NX.toFixed(1)}px"></div>
          <div class="epic-empty-bar">
            <div class="epic-bar-inner" style="position:relative;inset:unset;padding:0 10px">
              <span class="epic-bar-title" style="color:#97A0AF;font-style:italic">No implementation epic</span>
              <span class="epic-bar-por-pfx" style="display:inline-flex">
                <a class="epic-bar-por-id" href="${JIRA}${esc(por.key)}" target="_blank" onclick="event.stopPropagation()">${esc(por.key)}</a>
              </span>
            </div>
          </div>
        </div>
      </div>`;}

    for(const epic of por.epics){
      const withSp=epic.tasks.filter(t=>t.c0!==null);
      const noSp  =epic.tasks.filter(t=>t.c0===null);
      const eC0=withSp.length?Math.min(...withSp.map(t=>t.c0)):null;
      const eC1=withSp.length?Math.max(...withSp.map(t=>t.c1)):null;

      const totDev =epic.tasks.reduce((s,t)=>s+t.dev,0);
      const totQa  =epic.tasks.reduce((s,t)=>s+t.qa,0);
      const doneDev=epic.tasks.filter(t=>t.state==='completed').reduce((s,t)=>s+t.dev,0);
      const doneQa =epic.tasks.filter(t=>t.state==='completed').reduce((s,t)=>s+t.qa,0);
      const remDev=Math.max(0,totDev-doneDev),remQa=Math.max(0,totQa-doneQa);
      const totEff=totDev+totQa;
      const pct=totEff>0?Math.round((doneDev+doneQa)/totEff*100):0;

      const epicCtry=epic.countries||[];
      const taskCtry=[...new Set(epic.tasks.flatMap(t=>t.affected_country||[]))];
      const countries=epicCtry.length?epicCtry:taskCtry;
      const flags=countries.map(c=>FLAG[c]||'').filter(Boolean);
      const pIcon=PRIO_ICON[epic.priority||'']||'';
      const [eStatus,eStatusCls]=epicStatusBadge(epic);

      const eid='e-'+epic.key.replace(/[^a-z0-9]/gi,'-');
      const etid='et-'+eid;
      TIPS[etid]=epicTip(epic,pct,remDev,remQa,totDev,totQa,doneDev,doneQa);

      const isExpanded=expandState[eid]===true; // default collapsed
      const btnCls=isExpanded?'exp-btn':'exp-btn collapsed';
      const chevron=`<svg viewBox="0 0 10 6"><polyline points="1,1 5,5 9,1"/></svg>`;

      // ── Epic header row ──────────────────────────────────────────────
      html+=`<div class="g-row epic-row" onclick="toggleEpic('${eid}')">
        <div class="g-lbl epic-lbl" data-tipid="${etid}">
          <div class="${btnCls}" id="btn-${eid}">${chevron}</div>
          <div class="epic-lbl-info">
            <span class="epic-status-badge ${eStatusCls}">${eStatus}</span>
            <span class="epic-pct-text">${pct}% complete</span>
          </div>
        </div>
        <div class="g-tl" style="width:${TW}px;min-height:var(--eh)" data-tipid="${etid}">
          ${guides(N,SPRINTS)}<div class="now-line" style="left:${NX.toFixed(1)}px"></div>`;

      if(eC0!==null){
        const bgL=eC0*SW,bgW=(eC1-eC0+1)*SW;
        const progW=pct>0?Math.round(bgW*pct/100):0;
        const remTxt=(remDev>0||remQa>0)?`Remaining: ${fmt(remDev)} Dev · ${fmt(remQa)} QA`:'';
        html+=`<div class="epic-bg" style="left:${bgL}px;width:${bgW}px">
          <div class="epic-prog" style="width:${progW}px"></div>
          <div class="epic-bar-inner">
            <span class="epic-bar-pct">${pct}%</span>
            <span class="epic-bar-title">${esc(epic.title)}</span>
            <span class="epic-bar-por-pfx">
              <a class="epic-bar-por-id" href="${JIRA}${esc(por.key)}" target="_blank" onclick="event.stopPropagation()">${esc(por.key)}</a>
              <span class="epic-bar-por-sep">›</span>
            </span>
            <a class="epic-bar-id" href="${JIRA}${esc(epic.key)}" target="_blank" onclick="event.stopPropagation()">${esc(epic.key)}</a>
            ${remTxt?`<span class="epic-bar-rem">${esc(remTxt)}</span>`:''}
          </div>
        </div>`;
      } else {
        // All tasks have no sprint — dashed bar spanning full width, same bar content
        html+=`<div class="epic-empty-bar" style="left:8px;right:8px">
          <div class="epic-bar-inner" style="position:relative;inset:unset;padding:0 10px">
            <span class="epic-bar-pct" style="color:#97A0AF">${pct}%</span>
            <span class="epic-bar-title" style="color:#97A0AF;font-style:italic">${esc(epic.title)}</span>
            <span class="epic-bar-por-pfx" style="display:inline-flex">
              <a class="epic-bar-por-id" href="${JIRA}${esc(por.key)}" target="_blank" onclick="event.stopPropagation()">${esc(por.key)}</a>
              <span class="epic-bar-por-sep">›</span>
            </span>
            <a class="epic-bar-id" href="${JIRA}${esc(epic.key)}" target="_blank" onclick="event.stopPropagation()" style="opacity:.7">${esc(epic.key)}</a>
          </div>
        </div>`;
      }
      html+=`</div></div>`;

      // ── Epic group grid ──────────────────────────────────────────────
      const sortedWithSp=sortedTasks(withSp);
      const packRows=pack(sortedWithSp);
      const nsSorted=[...noSp].sort((a,b)=>{
        const ad=a.state==='completed'?0:1,bd=b.state==='completed'?0:1;
        return ad-bd||tickNum(a.key)-tickNum(b.key);});
      const nsNumRows=nsSorted.length>0?Math.ceil(nsSorted.length/Math.max(N,1)):0;
      const totalRows=Math.max(packRows.length+nsNumRows,1);
      const emlFlags=flags.length?`<div class="eml-flags">${flags.map(f=>`<span>${f}</span>`).join('')}</div>`:'';

      const grpDisplay=isExpanded?'':'none';
      html+=`<div class="epic-grp" id="${eid}" style="display:${grpDisplay}">
        <div class="eml" style="grid-column:1;grid-row:1/span ${totalRows}" data-tipid="${etid}">
          <a class="eml-key" href="${JIRA}${esc(epic.key)}" target="_blank">${esc(epic.key)}</a>
          ${pIcon?`<div>${pIcon}</div>`:''}
          ${emlFlags}
          <div class="eml-name">${esc(epic.title)}</div>
          <div class="eml-stat">${fmt(remDev)} Dev · ${fmt(remQa)} QA rem.</div>
        </div>`;

      let ri=1;
      for(const row of packRows){
        html+=`<div class="eml-ph" style="grid-column:1;grid-row:${ri}"></div>
          <div class="task-tl" style="grid-column:2;grid-row:${ri};width:${TW}px">
            ${guides(N,SPRINTS)}<div class="now-line" style="left:${NX.toFixed(1)}px"></div>`;
        for(const t of row){
          const bL=t.c0*SW+2,bW=(t.c1-t.c0+1)*SW-4;
          html+=barHtml(t,`left:${bL}px;width:${bW}px`);}
        html+=`</div>`;ri++;}

      for(let r=0;r<nsNumRows;r++){
        html+=`<div class="eml-ns" style="grid-column:1;grid-row:${ri}"></div>
          <div class="task-ns" style="grid-column:2;grid-row:${ri};width:${TW}px">
            ${guides(N,SPRINTS)}<div class="now-line" style="left:${NX.toFixed(1)}px"></div>`;
        for(let c=0;c<N;c++){
          const tIdx=c*nsNumRows+r;
          if(tIdx<nsSorted.length){
            const t=nsSorted[tIdx];
            html+=barHtml(t,`left:${c*SW+2}px;width:${SW-4}px`,'ns-bar');}}
        html+=`</div>`;ri++;}

      html+=`</div>`;}
  }

  // ── Board tasks section — per-sprint (Backlog mode only) ─────────────
  if(backlogOn && DATA.board_tasks && DATA.board_tasks.length){
    const chevron=`<svg viewBox="0 0 10 6"><polyline points="1,1 5,5 9,1"/></svg>`;

    // Top-level "Team Backlog" banner (non-clickable, informational)
    html+=`<div class="por-row" style="background:#EEF0F5;border-top-color:#97A0AF;border-bottom-color:#C1C7D0">
      <div class="por-row-guides" style="left:${LW}px">${guides(N,SPRINTS)}<div class="now-line" style="left:${NX.toFixed(1)}px"></div></div>
      <div class="g-lbl por-lbl" style="background:#EEF0F5;border-right-color:#B3BAC5">
        <span class="por-prio-tag" style="background:#DFE1E6;color:#344563;font-size:10px">Board</span>
        <span class="por-title" style="font-size:13px;color:#172B4D">Team Backlog</span>
        <span style="font-size:10px;color:#97A0AF">${DATA.board_tasks.length} task${DATA.board_tasks.length!==1?'s':''}</span>
      </div>
    </div>`;

    // Find the current (active) sprint column — tasks in earlier sprints go here
    const curCol=SPRINTS.findIndex(s=>s.state==='active');
    const anchorCol=curCol>=0?curCol:0;  // fallback to first sprint if none active

    // Group board tasks: tasks with col < anchorCol are bucketed into anchorCol
    const btBySprint={};
    const btNoSprint=[];
    for(const t of DATA.board_tasks){
      if(t.c0===null||t.c0===undefined){btNoSprint.push(t);}
      else{
        const col=t.c0<anchorCol?anchorCol:t.c0;
        if(!btBySprint[col])btBySprint[col]=[];btBySprint[col].push(t);}}

    // Render one expandable section per sprint, starting from anchorCol
    const sprintCols=Object.keys(btBySprint).map(Number).sort((a,b)=>a-b).filter(c=>c>=anchorCol);
    for(const col of sprintCols){
      const sp=SPRINTS[col];
      if(!sp)continue;
      const tasks=btBySprint[col];
      const isCurrent=col===anchorCol&&curCol>=0;
      const spSid=`board-sp-${sp.id||col}`;
      const spExpanded=expandState[spSid]===true;
      const dates=sp.from?`${fmtDate(sp.from)} – ${fmtDate(sp.to)}`:'';
      const piTag=piLabel(sp.pi);
      const spBtnCls=spExpanded?'exp-btn':'exp-btn collapsed';
      // Active sprint gets a distinct background
      const spBg=isCurrent?'#E3FCEF':'#F4F5F7';
      const spBorder=isCurrent?'#ABF5D1':'#DFE1E6';
      const spTitleColor=isCurrent?'#006644':'#344563';

      // Sprint separator row (clickable to toggle)
      html+=`<div class="por-row" style="background:${spBg};border-top-color:${spBorder};border-bottom-color:${spBorder};cursor:pointer" onclick="toggleEpic('${spSid}')">
        <div class="por-row-guides" style="left:${LW}px">${guides(N,SPRINTS)}<div class="now-line" style="left:${NX.toFixed(1)}px"></div></div>
        <div class="g-lbl por-lbl" style="background:${spBg};border-right-color:${spBorder}">
          <div class="${spBtnCls}" id="btn-${spSid}">${chevron}</div>
          <span class="por-title" style="font-size:12px;color:${spTitleColor};font-weight:700">${esc(sp.code)}</span>
          <span class="sp-pi-tag" style="${isCurrent?'background:#ABF5D1;color:#006644':''}">${piTag}</span>
          ${dates?`<span style="font-size:10px;color:#97A0AF">${esc(dates)}</span>`:''}
          <span style="font-size:10px;color:#97A0AF">${tasks.length} task${tasks.length!==1?'s':''}</span>
          ${isCurrent?`<span style="font-size:9px;font-weight:700;color:#006644;background:#ABF5D1;padding:1px 6px;border-radius:8px">Current</span>`:''}
        </div>
      </div>`;

      // Tasks grid for this sprint
      const spTasks=sortedTasks(tasks);
      const spPacked=pack(spTasks);
      const spTotal=Math.max(spPacked.length,1);
      html+=`<div class="epic-grp" id="${spSid}" style="display:${spExpanded?'':'none'}">
        <div class="eml" style="grid-column:1;grid-row:1/span ${spTotal};${isCurrent?'background:#F0FFF8;':''}" >
          <span style="font-size:11px;font-weight:700;color:${spTitleColor}">${esc(sp.code)}</span>
          <span class="sp-pi-tag" style="${isCurrent?'background:#ABF5D1;color:#006644':''}">${piTag}</span>
          <span class="eml-stat">${tasks.length} task${tasks.length!==1?'s':''}</span>
        </div>`;
      let spRi=1;
      for(const row of spPacked){
        html+=`<div class="eml-ph" style="grid-column:1;grid-row:${spRi}"></div>
          <div class="task-tl" style="grid-column:2;grid-row:${spRi};width:${TW}px">
            ${guides(N,SPRINTS)}<div class="now-line" style="left:${NX.toFixed(1)}px"></div>`;
        for(const t of row){const bL=t.c0*SW+2,bW=(t.c1-t.c0+1)*SW-4;html+=barHtml(t,`left:${bL}px;width:${bW}px`);}
        html+=`</div>`;spRi++;}
      html+=`</div>`;}

    // No-sprint fallback section (should be empty with updated JQL, but kept as safety net)
    if(btNoSprint.length){
      const nsSid='board-no-sprint';
      const nsExpanded=expandState[nsSid]===true;
      const nsBtnCls=nsExpanded?'exp-btn':'exp-btn collapsed';
      html+=`<div class="por-row" style="background:#F4F5F7;border-top-color:#DFE1E6;border-bottom-color:#E3E6EC;cursor:pointer" onclick="toggleEpic('${nsSid}')">
        <div class="por-row-guides" style="left:${LW}px">${guides(N,SPRINTS)}<div class="now-line" style="left:${NX.toFixed(1)}px"></div></div>
        <div class="g-lbl por-lbl" style="background:#F4F5F7;border-right-color:#DFE1E6">
          <div class="${nsBtnCls}" id="btn-${nsSid}">${chevron}</div>
          <span class="por-title" style="font-size:12px;color:#97A0AF">No Sprint</span>
          <span style="font-size:10px;color:#97A0AF">${btNoSprint.length} task${btNoSprint.length!==1?'s':''}</span>
        </div>
      </div>`;
      const nsSorted=[...btNoSprint].sort((a,b)=>tickNum(a.key)-tickNum(b.key));
      const nsNumRows=Math.max(Math.ceil(nsSorted.length/Math.max(N,1)),1);
      html+=`<div class="epic-grp" id="${nsSid}" style="display:${nsExpanded?'':'none'}">
        <div class="eml" style="grid-column:1;grid-row:1/span ${nsNumRows}">
          <span style="font-size:11px;font-weight:600;color:#97A0AF">No Sprint</span>
          <span class="eml-stat">${btNoSprint.length} tasks</span>
        </div>`;
      for(let r=0;r<nsNumRows;r++){
        html+=`<div class="eml-ns" style="grid-column:1;grid-row:${r+1}"></div>
          <div class="task-ns" style="grid-column:2;grid-row:${r+1};width:${TW}px">
            ${guides(N,SPRINTS)}<div class="now-line" style="left:${NX.toFixed(1)}px"></div>`;
        for(let c=0;c<N;c++){const tIdx=c*nsNumRows+r;if(tIdx<nsSorted.length)html+=barHtml(nsSorted[tIdx],`left:${c*SW+2}px;width:${SW-4}px`,'ns-bar');}
        html+=`</div>`;}
      html+=`</div>`;}
  }

  document.getElementById('gantt').innerHTML=html;
  document.getElementById('gantt').style.minWidth=(LW+TW)+'px';}

function toggleEpic(eid){
  const el=document.getElementById(eid);
  const btn=document.getElementById('btn-'+eid);
  if(!el)return;
  const nowHidden=el.style.display==='none';
  expandState[eid]=nowHidden; // true = expanded
  el.style.display=nowHidden?'':'none';
  if(btn){btn.classList.toggle('collapsed',!nowHidden);}
}
function expandAll(){
  document.querySelectorAll('.epic-grp').forEach(el=>{
    expandState[el.id]=true;
    el.style.display='';
    const btn=document.getElementById('btn-'+el.id);
    if(btn)btn.classList.remove('collapsed');});}
function collapseAll(){
  document.querySelectorAll('.epic-grp').forEach(el=>{
    expandState[el.id]=false;
    el.style.display='none';
    const btn=document.getElementById('btn-'+el.id);
    if(btn)btn.classList.add('collapsed');});}

// ── Tooltips ──────────────────────────────────────────────────────────────
const TT=document.getElementById('ttip');
const AVTT=document.getElementById('av-ttip');

document.addEventListener('mousemove',e=>{
  const tx=Math.min(e.clientX+14,window.innerWidth-360);
  const ty=Math.min(e.clientY+14,window.innerHeight-320);
  TT.style.left=tx+'px'; TT.style.top=ty+'px';
  const ttW=TT.offsetWidth||320;
  AVTT.style.left=Math.min(tx+ttW+2,window.innerWidth-320)+'px';
  AVTT.style.top=ty+'px';});

document.addEventListener('mouseover',e=>{
  const avEl=e.target.closest('[data-av-tip]');
  if(avEl){
    const tip=AV_TIPS[avEl.dataset.avTip];
    if(tip&&tip.name){
      let inner=`<div class="t-h">${tip.name}</div>`;
      if(tip.history&&tip.history.length){
        inner+=`<div class="t-sec"><div class="t-sec-h">Assignment History</div>
          <table style="width:100%;border-collapse:collapse;font-size:10px;margin-top:2px">
            <tr style="color:#97A0AF">
              <th style="padding:1px 8px 3px 0;text-align:left;font-weight:600">Assignee</th>
              <th style="padding:1px 8px 3px 0;text-align:left;font-weight:600">Duration</th>
              <th style="padding:1px 8px 3px 0;text-align:left;font-weight:600">Start</th>
              <th style="padding:1px 0 3px 0;text-align:left;font-weight:600">End</th>
            </tr>`;
        for(const h of tip.history){
          const st=h.start?fmtDTCompact(h.start):'-';
          const en=h.closed?'Closed':(h.end?fmtDTCompact(h.end):'Current');
          const enClr=h.closed?'#DE350B':(h.end?'#6B778C':'#00875A');
          let dur='-';
          if(h.start){
            const endT=h.end?new Date(h.end):new Date();
            const ms=Math.max(0,endT-new Date(h.start));
            const s2=ms/1000,d=Math.floor(s2/86400),hr=Math.floor((s2%86400)/3600),m=Math.floor((s2%3600)/60);
            const p=[];if(d>0)p.push(d+'d');if(hr>0)p.push(hr+'h');if(m>0&&d===0)p.push(m+'m');
            dur=p.length?p.join(' '):'0m';}
          const avImg=h.avatar_url?`<img style="width:14px;height:14px;border-radius:50%;object-fit:cover;margin-right:4px;vertical-align:middle" src="${esc(h.avatar_url)}" onerror="this.style.display='none'" alt="">`:'';
          inner+=`<tr>
            <td style="padding:2px 8px 2px 0">${avImg}${esc(h.assignee||'')}</td>
            <td style="padding:2px 8px 2px 0;color:#0052CC;font-weight:600">${dur}</td>
            <td style="padding:2px 8px 2px 0;color:#6B778C">${st}</td>
            <td style="padding:2px 0;color:${enClr};font-weight:${h.closed||!h.end?'600':'400'}">${en}</td>
          </tr>`;}
        inner+=`</table></div>`;}
      AVTT.innerHTML=inner;AVTT.style.display='flex';AVTT.style.flexDirection='column';}
    return;}
  AVTT.style.display='none';
  const el=e.target.closest('[data-tipid]');
  if(el&&TIPS[el.dataset.tipid]){TT.innerHTML=TIPS[el.dataset.tipid];TT.style.display='block';}});

document.addEventListener('mouseout',e=>{
  if(e.target.closest('[data-av-tip]')&&!e.target.closest('[data-av-tip]').contains(e.relatedTarget))AVTT.style.display='none';
  const el=e.target.closest('[data-tipid]');
  if(el&&!el.contains(e.relatedTarget))TT.style.display='none';});

// ── Show/Hide PORs toggle ─────────────────────────────────────────────────
function toggleShowPors(){
  document.body.classList.toggle('hide-pors');
  const hidingNow=document.body.classList.contains('hide-pors');
  const pill=document.getElementById('pill-show-pors');
  if(pill)pill.classList.toggle('active',!hidingNow);}

// ── Init ──────────────────────────────────────────────────────────────────
document.body.classList.add('hide-pors'); // PORs hidden by default
initFilters();
render();
</script>
